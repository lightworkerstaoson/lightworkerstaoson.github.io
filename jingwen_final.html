<meta charset="UTF-8">

<title>三清玄之子 · 法會經文</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f5f0e6;
    --surface: #faf7f0;
    --border: #c8b89a;
    --gold: #9a7a3a;
    --ink: #1e1208;
    --muted: #6b5a3e;
    --tab-active: #5a3a1a;
    --red: #8b2020;
    --header-h: 80px;
    --notice-h: 44px;
    --tab-h: 50px;
  }
  body {
    background: var(--bg);
    font-family: 'Noto Serif TC', serif;
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
  }
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(90,58,26,0.10);
  }
  header img { height: 44px; width: auto; }
  .brand-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--tab-active);
    letter-spacing: 0.12em;
  }
  .notice-bar {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    height: var(--notice-h);
    background: var(--red);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    letter-spacing: 0.06em;
    z-index: 198;
    padding: 0 16px;
    text-align: center;
    line-height: 1.4;
  }
  .tabs {
    position: fixed;
    top: calc(var(--header-h) + var(--notice-h));
    left: 0; right: 0;
    height: var(--tab-h);
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    display: flex;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    z-index: 199;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    padding: 0 20px;
    height: 100%;
    display: flex;
    align-items: center;
    font-family: inherit;
    font-size: 14px;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.08em;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab.active {
    color: var(--tab-active);
    border-bottom-color: var(--gold);
    font-weight: 700;
  }
  .content-area {
    position: fixed;
    top: calc(var(--header-h) + var(--notice-h) + var(--tab-h));
    left: 0; right: 0; bottom: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--bg);
  }
  .section {
    display: none;
    padding: 16px 12px 40px;
    max-width: 680px;
    margin: 0 auto;
  }
  .section.active { display: block; }
  .section img {
    width: 100%;
    display: block;
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(90,58,26,0.12);
    margin-bottom: 16px;
  }
  .page-count {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 0.1em;
  }
</style>
</head>

<script>
  const tabs = document.querySelectorAll('.tab');
  const sections = document.querySelectorAll('.section');
  const contentArea = document.getElementById('contentArea');

  function showTab(i) {
    tabs.forEach((t, idx) => t.classList.toggle('active', idx === i));
    sections.forEach((s, idx) => s.classList.toggle('active', idx === i));
    contentArea.scrollTop = 0;
  }
